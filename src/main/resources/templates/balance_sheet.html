<!DOCTYPE html>
<html lang="en-US" xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Balance sheet</title>
	<link rel="icon" type="image/png" th:href="@{./favicon.ico}"/>
	<link rel="stylesheet" type="text/css" th:href="@{./font-awesome-4.7.0/css/font-awesome.min.css}">
	<link rel="stylesheet" type="text/css" th:href="@{./css/common.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{./css/table.css}"/>
	<link rel="stylesheet" type="text/css" th:href="@{./css/spreadsheet.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{./css/reports.css}"/>

	<style>
	.balwidth {
		width: 75px;
	}
	</style>

	<script th:src="@{./js/common.js}"></script>
	<script th:insert="~{nav :: required}" th:remove="tag"></script>

    <script type="module">
		const balanceSheetJS = '../js/balance_sheet.js';
		const { default: BalanceSheet } = await import(balanceSheetJS);

		let params = getUrlParams();
		let account = params['account'];
		if(typeof(account) === 'undefined') {
			alert('Missing account');
		} else {
			new BalanceSheet(account);
		}
	</script>
</head>
<body>

<div th:insert="~{nav :: menu}"></div>

<table id="content" style="display: none" class="mytable">
	<caption style="display: none">Balance sheet</caption>
	<tr>
		<th scope="col">year</th>
		<th scope="col" class="balwidth">month</th>
		<th scope="col" class="balwidth">credits</th>
		<th scope="col" class="balwidth">debits</th>
		<th scope="col" class="balwidth">gain/loss</th>
		<th scope="col" class="balwidth">balance</th>
	</tr>
</table>

<input type="hidden" id="account" th:value="${account}"/>

</body>
</html>
