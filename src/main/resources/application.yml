---
server:
  port: 8443
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      protocol-header: X-Forwarded-Proto
      remote-ip-header: X-Forwarded-For

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FinancesCP
      connection-test-query: SELECT 1
      minimum-idle: 3
      maximum-pool-size: 10
      idle-timeout: 10000
  data:
    redis:
      repositories:
        enabled: false
  session:
    store-type: redis
    timeout: 600s
    redis:
      namespace: "finances"
