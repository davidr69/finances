---
server:
  port: 8443
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      protocol-header: X-Forwarded-Proto
      remote-ip-header: X-Forwarded-For
    threads:
      max: 64
  servlet:
    session:
      timeout: 600

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FinancesCP
      connection-test-query: SELECT 1
      minimum-idle: 3
      maximum-pool-size: 10
      idle-timeout: 10000
  data:
    redis:
      repositories:
        enabled: false
#  session:
#    store-type: redis
#    redis:
#      namespace: "finances"
#      repository-type: default
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
