syntax = "proto3";

option java_package = "com.lavacro.finances.shared.proto";
option java_outer_classname = "DecisionProto";

message DecisionMessage {
  enum Decision {
    UNKNOWN = 0;
    USE_VECTOR = 1;
    USE_LLM = 2;
  }

  Decision decision = 1;
  int64 transaction_id = 2;
  int64 original_vendor_id = 3;
  string original_vendor_name = 4;
  int64 new_vendor_id = 5;
  string new_vendor_name = 6;
}
